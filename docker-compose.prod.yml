services:
  web:
    build: ./backend
    restart: unless-stopped
    # gunicorn en prod; ajustar workers según CPUs disponibles
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 60
      --access-logfile -
      --error-logfile -
    volumes:
      - static_volume:/app/staticfiles
    # Sin "ports": gunicorn solo es alcanzable desde nginx en la red interna.
    # Publicar 8000 permitiría saltarse nginx (TLS, límite de body).
    expose:
      - "8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Nginx delante de gunicorn para servir estáticos y terminar TLS
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # descomentar cuando haya certificado TLS
    volumes:
      - static_volume:/app/staticfiles:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro   # montar certs cuando haya TLS
    depends_on:
      - web

volumes:
  static_volume:
